<!-- Micro-interaction Scripts -->
<script>
        // Subtle Mouse parallax for the glow effects
        document.addEventListener('mousemove', (e) => {
            const glows = document.querySelectorAll('.scent-glow');
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            glows.forEach((glow, index) => {
                const speed = (index + 1) * 20;
                const moveX = (x - 0.5) * speed;
                const moveY = (y - 0.5) * speed;
                glow.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });

        // Input interactions
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.querySelector('label').style.color = '#e9c349';
                input.parentElement.querySelector('label').style.letterSpacing = '0.25em';
            });
            input.addEventListener('blur', () => {
                input.parentElement.querySelector('label').style.color = '';
                input.parentElement.querySelector('label').style.letterSpacing = '';
            });
        });
    </script>
